name: Publish

# Publishes @itechsmart/prooflink-verifier on a GitHub Release, or manually.
# Requires repo secret: NPM_TOKEN (npm automation token).
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
