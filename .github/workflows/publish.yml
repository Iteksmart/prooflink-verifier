name: Publish

# @itechsmart/prooflink-verifier via npm OIDC Trusted Publishing (no stored token).
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  npm:
    name: Publish to npm (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest  # requires npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm (OIDC + provenance)
        run: npm publish --access public --provenance
